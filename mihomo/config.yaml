######### 锚点 start #######
pr: &pr {type: select, proxies: [默認代理, 自動選擇, 手動選擇, 負載均衡, 故障轉移, 國內直連, 拒絕連接]}
p: &p {type: http, interval: 86400, health-check: {enable: true, url: "https://www.gstatic.com/generate_204", interval: 300}}
######### 锚点 end #######

# 全局配置
port: 7890
socks-port: 7891
mixed-port: 7892
redir-port: 7893
tproxy-port: 7894
ipv6: true
# interface-name: tun0  # 如果需要配合VPN嵌套使用，需使用此功能
mode: Rule
allow-lan: true
bind-address: '*'
unified-delay: true
tcp-concurrent: true
log-level: error # silent/error/warning/info/debug
find-process-mode: always # always/strict/off
disable-keep-alive: false
keep-alive-interval: 15
keep-alive-idle: 600
profile:
  store-selected: true
  store-fake-ip: true

# 控制面板
external-controller: 0.0.0.0:9090
secret: "Xeran"
external-ui: WebUI
external-ui-name: # MetaCubeXD # zashboard
external-ui-url: "https://github.com/MetaCubeX/metacubexd/releases/latest/download/compressed-dist.tgz"

# DNS
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  prefer-h3: false
  use-hosts: true
  use-system-hosts: true
  ipv6: true
  ipv6-timeout: 300
  respect-rules: false # 遵循路由規則
  enhanced-mode: fake-ip # fake-ip/redir-host
  fake-ip-range: 198.18.0.1/16 # 198.18.0.1/16 28.0.0.1/8
  fake-ip-filter-mode: blacklist # blacklist/whitelist
  fake-ip-filter:
    - "rule-set:Fake-IP-Filter"
    - "rule-set:private_domain,cn_domain"
    - '*.lan'
    - '*.ntp.*'
    - '*.local'
  default-nameserver: # 默認DNS解析
    # - 223.5.5.5
    # - 119.29.29.29
    - tls://223.5.5.5
    - tls://223.6.6.6
    # - system # 系统 DNS (保留以防万一)
  direct-nameserver: # 直連DNS解析
    # - 223.5.5.5
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: false # false为先使用direct-nameserver规则进行解析，true为先使用nameserver-policy解析，无解析结果再使用direct-nameserver进行解析
  proxy-server-nameserver: # 代理节点域名解析
    # - 223.5.5.5
    # - 119.29.29.29
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver-policy: # 指定域名查询的解析服务器，可使用 geosite, 优先于 nameserver/fallback 查询 [键支持域名通配] [值支持字符串/数组]
    '+.baidu.com': '114.114.114.114'
    "rule-set:cn_domain,private_domain":
      # - 223.5.5.5
      # - 119.29.29.29
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:proxy_domain":
      - tls://8.8.8.8#默認代理&h3=true
      - tls://8.8.4.4#默認代理&h3=true
      - tls://1.1.1.1#默認代理&h3=true
  nameserver: # 默认DNS域名解析服务器
    - 223.5.5.5
    - 119.29.29.29

# 域名嗅探
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "+.qq.com"
    - "+.wechatapp.com"
    - "+.wechat.com"

# 入站
tun:
  enable: true
  stack: mixed # system/gvisor/mixed
  device: Meta
  udp-timeout: 300
  auto-route: true
  strict-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - "any:53"
    - "tcp://any:53"

# 出站
proxy-providers:
  魔戒:
    <<: *p
    type: file
    path: proxy_provider/魔戒

# 代理组
proxies:
  - {name: DNS_Hijack, type: dns}
  - {name: 國內直連, type: direct, udp: true}
  - {name: 拒絕連接, type: reject}
proxy-groups:
  - {name: 默認代理, type: select, proxies: [自動選擇, 手動選擇, 負載均衡, 故障轉移, 國內直連, 拒絕連接], icon: https://cdn.jsdelivr.net/gh/Elegy17/NetFlowNest@main/Mihomo/icon/Star.png}
  - {name: 自動選擇, type: url-test, include-all-providers: true, icon: https://cdn.jsdelivr.net/gh/Elegy17/NetFlowNest@main/Mihomo/icon/Auto.png}
  - {name: 手動選擇, type: select, include-all-providers: true, icon: https://cdn.jsdelivr.net/gh/Elegy17/NetFlowNest@main/Mihomo/icon/manual.svg}
  - {name: 負載均衡, type: load-balance, include-all-providers: true, strategy: consistent-hashing, icon: https://cdn.jsdelivr.net/gh/Elegy17/NetFlowNest@main/Mihomo/icon/Load-Balancing.svg}
  - {name: 故障轉移, type: fallback, include-all-providers: true, icon: https://cdn.jsdelivr.net/gh/Elegy17/NetFlowNest@main/Mihomo/icon/Back.png}
  - {name: FCM推送, type: select, proxies: [國內直連, 默認代理], icon: https://cdn.jsdelivr.net/gh/Elegy17/NetFlowNest@main/Mihomo/icon/Mail.png}
  - {name: 廣告過濾, type: select, proxies: [REJECT-DROP, PASS], icon: https://cdn.jsdelivr.net/gh/Elegy17/NetFlowNest@main/Mihomo/icon/AD-Blocker.png}
  - {name: 漏網之魚, type: select, proxies: [默認代理, 國內直連], icon: https://cdn.jsdelivr.net/gh/Elegy17/NetFlowNest@main/Mihomo/icon/Final.png}

# 路由规则
rules:
  - DST-PORT,53,DNS_Hijack
  - DST-PORT,5228,FCM推送
  - SUB-RULE,(OR,((NETWORK,TCP),(NETWORK,UDP))),AD-BLOCKING
  - RULE-SET,proxy_domain,默認代理
  - DOMAIN-REGEX,^.*mtalk.google.com,FCM推送
  - OR,((RULE-SET,cn_ip),(RULE-SET,cn_domain),(RULE-SET,private_ip),(RULE-SET,private_domain)),國內直連
  - MATCH,漏網之魚

# 子规则集
sub-rules:
  AD-BLOCKING:
    - RULE-SET,AdRules,廣告過濾
    - RULE-SET,AdBlock-DNS-Filters,廣告過濾
    - RULE-SET,秋风广告规则,廣告過濾

# 规则集
rule-anchor:
  ipcidr: &ipcidr { type: http, behavior: ipcidr, format: mrs, interval: 86400, proxy: DIRECT, size-limit: 0}
  domain: &domain { type: http, behavior: domain, format: mrs, interval: 86400, proxy: DIRECT, size-limit: 0}
  classical: &classical { type: http, behavior: classical, format: yaml, interval: 86400, proxy: DIRECT, size-limit: 0}
  local: &local { type: file, behavior: classical, format: text, interval: 86400}
rule-providers:
  Fake-IP-Filter: { <<: *domain, path: ./Rule/Fake-IP-Filter.mrs, url: "https://ghfast.top/github.com/DustinWin/ruleset_geodata/raw/refs/heads/mihomo-ruleset/fakeip-filter.mrs"}
  proxy_domain: { <<: *domain, path: ./Rule/proxy_domain.mrs, url: "https://ghfast.top/github.com/DustinWin/ruleset_geodata/raw/refs/heads/mihomo-ruleset/proxy.mrs"}
  private_domain: { <<: *domain, path: ./Rule/private_domain.mrs, url: "https://ghfast.top/github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/private.mrs"}
  cn_domain: { <<: *domain, path: ./Rule/cn_domain.mrs, url: "https://ghfast.top/github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/cn.mrs"}
  秋风广告规则: { <<: *domain, path: ./Rule/AWAvenue-Ads-Rule-Clash.mrs, url: "https://github.boki.moe/https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.mrs"}
  AdBlock-DNS-Filters: { <<: *domain, path: ./Rule/AdBlock-DNS-Filters.mrs, url: "https://gcore.jsdelivr.net/gh/217heidai/adblockfilters@main/rules/adblockmihomo.mrs"}
  AdRules: { <<: *domain, path: ./Rule/AdRules.mrs, url: "https://gitlab.com/cats-team/adrules/-/raw/main/adrules-mihomo.mrs"}

  cn_ip: { <<: *ipcidr, path: ./Rule/cn_ip.mrs, url: "https://ghfast.top/github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/cn.mrs"}
  private_ip: { <<: *ipcidr, path: ./Rule/private_ip.mrs, url: "https://ghfast.top/github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/private.mrs"}
